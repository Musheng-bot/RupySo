<!DOCTYPE html>
{% load static %}
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>FATAL_ERROR</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #0f0;
            font-family: 'Consolas', 'Courier New', monospace;
            height: 100%; overflow: hidden;
        }

        /* 1. 左上角命令行样式 */
        #console-container {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
            z-index: 5;
            max-width: 90%;
        }

        /* 2. 乱码 Canvas */
        #glitch-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; z-index: 1;
        }

        /* 3. 居中警告文字 */
        #final-warning {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #f00;
            font-weight: bold;
            font-size: 3.5rem;
            display: none;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            letter-spacing: 5px;
        }

        #hint {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            color: #333; font-size: 0.75rem;
            display: none; z-index: 5;
            letter-spacing: 3px;
        }

        .cursor { display: inline-block; width: 8px; height: 18px; background: #0f0; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="console-container">
        <div id="typed-content"></div><span id="cursor" class="cursor"></span>
    </div>

    <canvas id="glitch-canvas"></canvas>

    <div id="hint">HOLD [ SPACE ] TO OVERRIDE SYSTEM</div>
    <div id="final-warning">I W∀RNED Y0U!</div>

    <script>
        const typedContent = document.getElementById('typed-content');
        const canvas = document.getElementById('glitch-canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        const finalWarning = document.getElementById('final-warning');
        const cursor = document.getElementById('cursor');

        let spacePressed = false;
        let glitchIntensity = 1; // 1 = 正常乱码, 0 = 全黑
        let gameStep = 0;

        // --- 步骤 1: 左上角打印命令 ---
        async function runSequence() {
            await typeText("> sudo access_internal_memory --force", 40);
            await sleep(2000);

            // 分行处理
            await typeText("\nWait...", 80);
            await sleep(1000);
            await typeText("\nYou should not be here.", 80);

            await sleep(1500);
            startGlitchMode();
        }

        // --- 步骤 2: 乱码模式 (Canvas) ---
        function startGlitchMode() {
            document.getElementById('console-container').style.display = 'none';
            canvas.style.display = 'block';
            hint.style.display = 'block';
            gameStep = 1;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderGlitch();
        }

        function renderGlitch() {
            if(gameStep < 1) return;

            // 关键：黑色遮盖层
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 乱码数量由 glitchIntensity 决定
            const charCount = 60 * glitchIntensity;
            ctx.fillStyle = "#0f0";
            ctx.font = "16px monospace";

            for(let i = 0; i < charCount; i++) {
                const text = String.fromCharCode(33 + Math.random() * 94);
                ctx.fillText(text, Math.random() * canvas.width, Math.random() * canvas.height);
            }
            requestAnimationFrame(renderGlitch);
        }

        // --- 步骤 3: Space 逻辑 (乱码消减) ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && gameStep === 1) {
                spacePressed = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') spacePressed = false;
        });

        function updateSystemState() {
            if (spacePressed && gameStep === 1) {
                // 随着按下，强度降低（变向全黑）
                glitchIntensity -= 0.008;
                if (glitchIntensity <= 0) {
                    glitchIntensity = 0;
                    triggerFinalWarning();
                }
            } else if (gameStep === 1 && glitchIntensity < 1) {
                // 松开回弹
                glitchIntensity += 0.015;
                if (glitchIntensity > 1) glitchIntensity = 1;
            }

            requestAnimationFrame(updateSystemState);
        }

        async function triggerFinalWarning() {
            gameStep = 2;
            hint.style.display = 'none';
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            await sleep(500);
            finalWarning.style.display = 'block';

            // 等待 2 秒
            await sleep(2000);

            // --- 模拟关闭/自毁的效果 ---
            document.title = "FATAL ERROR: 0x0000005"; // 修改标签页标题
            document.body.innerHTML = ""; // 清空所有内容
            document.body.style.backgroundColor = "black";
            document.body.style.cursor = "none"; // 隐藏鼠标，增加死机感

            // 强制停止浏览器继续渲染
            window.stop();
            const hex = '0123456789ABCDEF';
            let corruptPath = 'SEGFAULT_';
            for(let i = 0; i < 64; i++) {
                corruptPath += hex.charAt(Math.floor(Math.random() * 16));
                if(i % 8 === 0 && i > 0) corruptPath += '_';
            }

            // 终极自毁：重定向到一个看起来像内存溢出的奇怪地址
            // 例如：/SEGFAULT_A1B2_C3D4_E5F6...%F1%A2%99
            window.location.href = "/" + corruptPath + "?mem_addr=0x" + Math.random().toString(16).toUpperCase() + "&status=destroyed";
        }

        // --- 工具函数 ---
        function typeText(text, speed) {
            return new Promise(resolve => {
                let i = 0;
                function type() {
                    if (i < text.length) {
                        let char = text.charAt(i);

                        // 如果是空格，转义为 &nbsp; 确保 HTML 渲染
                        if (char === " ") {
                            typedContent.innerHTML += "&nbsp;";
                        } else {
                            typedContent.innerText += char;
                        }

                        i++;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

        // 初始化
        runSequence();
        updateSystemState();

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
